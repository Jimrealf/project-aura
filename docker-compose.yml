version: "3.9"

services:
    postgres:
        image: postgres:16-alpine
        container_name: aura-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: aura
            POSTGRES_PASSWORD: aura_dev
            POSTGRES_DB: aura_db
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    mongo:
        image: mongo:7
        container_name: aura-mongo
        restart: unless-stopped
        ports:
            - "27017:27017"
        volumes:
            - mongodata:/data/db

    redis:
        image: redis:7-alpine
        container_name: aura-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redisdata:/data

volumes:
    pgdata:
    mongodata:
    redisdata:
